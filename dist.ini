name = App-ModuleAudit
version = 0.0.1
author = Thomas Browder <tbrowder@acm.org>
license = Artistic-2.0

[Meta6]
name = App-ModuleAudit
version = 0.0.1
license = Artistic-2.0
perl-version = 6.d

[ReadmeFromPod]
enabled = false

[GenerateFile/README.md]
filename = README.md
content = generated from docs/README.rakudoc during release

[ExecDir]
dir = bin

[Git::GatherDir]
exclude_filename = README.md

[PruneFiles]
match = ^ ".github/"

[MetaProvides::Package]
[PodWeaver]
[UploadToZef]
